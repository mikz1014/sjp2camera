<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Camera Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        #video.mirrored {
            transform: scaleX(-1);
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            transition: opacity 0.3s, visibility 0.3s;
        }

        body:not(.fullscreen) #controls {
            opacity: 1;
            visibility: visible;
        }

        body.fullscreen #controls {
            opacity: 0;
            visibility: hidden;
        }

        body.fullscreen.show-controls #controls {
            opacity: 1;
            visibility: visible;
        }

        button {
            background-color: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #666;
        }

        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            transition: opacity 0.3s, visibility 0.3s;
        }

        body:not(.fullscreen) #status {
            opacity: 1;
            visibility: visible;
        }

        body.fullscreen #status {
            opacity: 0;
            visibility: hidden;
        }

        body.fullscreen.show-controls #status {
            opacity: 1;
            visibility: visible;
        }

        #error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.8);
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            z-index: 3;
            display: none;
        }

        #help-text {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            z-index: 2;
            transition: opacity 0.3s, visibility 0.3s;
        }

        body:not(.fullscreen) #help-text {
            opacity: 1;
            visibility: visible;
        }

        body.fullscreen #help-text {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <div id="status">Camera: Not Active</div>
    
    <div id="controls">
        <button id="fullscreen-btn">Full Screen</button>
        <button id="flip-camera">Mirror Flip</button>
    </div>
    
    <div id="help-text">Press ESC to show/hide controls in full screen</div>
    
    <div id="error">
        <h3>Camera Access Error</h3>
        <p>Unable to access your camera. Please check permissions and try again.</p>
        <button id="retry-btn">Retry</button>
    </div>

    <script>
        // DOM elements
        const video = document.getElementById('video');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const flipCameraBtn = document.getElementById('flip-camera');
        const status = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const retryBtn = document.getElementById('retry-btn');
        const helpText = document.getElementById('help-text');
        
        // Variables
        let currentStream = null;
        let isMirrored = false;
        
        // Request camera access and start video
        async function startCamera() {
            // Stop any existing stream
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            
            const constraints = {
                video: {
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                currentStream = stream;
                status.textContent = 'Camera: Active';
                errorDiv.style.display = 'none';
                
                return stream;
            } catch (err) {
                console.error('Error accessing camera:', err);
                status.textContent = 'Camera: Error';
                errorDiv.style.display = 'block';
                return null;
            }
        }
        
        // Toggle mirror flip
        function toggleMirrorFlip() {
            isMirrored = !isMirrored;
            if (isMirrored) {
                video.classList.add('mirrored');
                flipCameraBtn.textContent = 'Normal View';
            } else {
                video.classList.remove('mirrored');
                flipCameraBtn.textContent = 'Mirror Flip';
            }
        }
        
        // Toggle full screen
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error('Error attempting to enable full screen:', err);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        // Toggle controls visibility in full screen
        function toggleControls() {
            document.body.classList.toggle('show-controls');
        }
        
        // Event listeners
        fullscreenBtn.addEventListener('click', toggleFullScreen);
        
        flipCameraBtn.addEventListener('click', toggleMirrorFlip);
        
        retryBtn.addEventListener('click', () => {
            startCamera();
        });
        
        // Full screen change event
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('fullscreen');
                fullscreenBtn.textContent = 'Exit Full Screen';
            } else {
                document.body.classList.remove('fullscreen');
                document.body.classList.remove('show-controls');
                fullscreenBtn.textContent = 'Full Screen';
            }
        });
        
        // ESC key to toggle controls in full screen
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.fullscreenElement) {
                toggleControls();
            }
        });
        
        // Initialize camera on page load
        window.addEventListener('load', async () => {
            await startCamera();
        });
    </script>
</body>
</html>
