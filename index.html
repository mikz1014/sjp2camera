<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Stream Camera Monitor - Back Camera Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            touch-action: pan-x pan-y; /* Allow touch scrolling only when needed */
        }

        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        #video.mirrored {
            transform: scaleX(-1);
        }

        /* Controls panel - modern glassmorphism style */
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        body:not(.fullscreen) #controls {
            opacity: 1;
            visibility: visible;
        }

        body.fullscreen #controls {
            opacity: 0;
            visibility: hidden;
        }

        body.fullscreen.show-controls #controls {
            opacity: 1;
            visibility: visible;
        }

        button {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            touch-action: manipulation;
            min-width: 100px;
        }

        button:active {
            transform: scale(0.96);
            background-color: rgba(255, 255, 255, 0.35);
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.3s, visibility 0.3s;
            letter-spacing: 0.3px;
            border-left: 3px solid #4caf50;
        }

        body:not(.fullscreen) #status {
            opacity: 1;
            visibility: visible;
        }

        body.fullscreen #status {
            opacity: 0;
            visibility: hidden;
        }

        body.fullscreen.show-controls #status {
            opacity: 1;
            visibility: visible;
        }

        #error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            z-index: 3;
            display: none;
            max-width: 85%;
            width: 320px;
            border: 1px solid rgba(255, 80, 80, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        #error h3 {
            color: #ff6b6b;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        #error p {
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.4;
        }

        #error button {
            background-color: #ff6b6b;
            padding: 10px 24px;
        }

        #help-text {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            text-align: center;
            z-index: 2;
            transition: opacity 0.3s, visibility 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }

        body:not(.fullscreen) #help-text {
            opacity: 1;
            visibility: visible;
        }

        body.fullscreen #help-text {
            opacity: 0;
            visibility: hidden;
        }

        /* Camera switch button special styling */
        #switch-camera {
            background-color: rgba(33, 150, 243, 0.85);
        }

        #switch-camera:active {
            background-color: rgba(33, 150, 243, 1);
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 768px) {
            button {
                padding: 8px 16px;
                font-size: 13px;
                min-width: 80px;
            }
            
            #controls {
                gap: 8px;
                padding: 10px 16px;
                bottom: 15px;
            }
            
            #help-text {
                bottom: 80px;
                font-size: 10px;
                white-space: nowrap;
            }
            
            #status {
                top: 12px;
                left: 12px;
                font-size: 11px;
                padding: 6px 12px;
            }
        }

        /* Loading indicator */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 10;
            display: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <div id="status">
        <span id="status-icon">📷</span> Camera: <span id="status-text">Initializing...</span>
    </div>
    
    <div id="controls">
        <button id="fullscreen-btn" title="Full Screen">⛶ Full Screen</button>
        <button id="switch-camera" title="Switch Camera">🔄 Switch Cam</button>
        <button id="flip-camera" title="Mirror">🪞 Mirror</button>
    </div>
    
    <div id="help-text">✨ Tap ESC to show/hide controls in full screen | Switch camera button toggles front/back</div>
    
    <div id="error">
        <h3>⚠️ Camera Access Error</h3>
        <p>Unable to access your camera. Please check permissions and ensure camera is not in use by another app.</p>
        <button id="retry-btn">Try Again</button>
    </div>
    
    <div class="loading-indicator" id="loading"></div>

    <script>
        // DOM elements
        const video = document.getElementById('video');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const flipCameraBtn = document.getElementById('flip-camera');
        const switchCameraBtn = document.getElementById('switch-camera');
        const statusTextSpan = document.getElementById('status-text');
        const statusIconSpan = document.getElementById('status-icon');
        const errorDiv = document.getElementById('error');
        const retryBtn = document.getElementById('retry-btn');
        const loadingDiv = document.getElementById('loading');
        
        // Variables
        let currentStream = null;
        let isMirrored = false;
        let currentFacingMode = 'environment'; // 'user' = front, 'environment' = back (default back)
        let isSwitchingCamera = false;
        
        // Helper to update status UI
        function updateStatus(message, isError = false) {
            statusTextSpan.textContent = message;
            if (isError) {
                statusIconSpan.textContent = '❌';
            } else if (message === 'Active') {
                statusIconSpan.textContent = '📹';
            } else if (message === 'Switching...') {
                statusIconSpan.textContent = '🔄';
            } else {
                statusIconSpan.textContent = '📷';
            }
        }
        
        // Show/hide loading indicator
        function setLoading(show) {
            if (show) {
                loadingDiv.style.display = 'block';
            } else {
                loadingDiv.style.display = 'none';
            }
        }
        
        // Get camera constraints based on selected facing mode
        function getCameraConstraints() {
            // For mobile devices, we use facingMode to select back or front camera
            // 'environment' = back camera (默认)
            // 'user' = front camera (selfie)
            return {
                video: {
                    facingMode: { exact: currentFacingMode },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    frameRate: { ideal: 30 }
                },
                audio: false
            };
        }
        
        // Alternative method: enumerate devices and select by label (fallback for older browsers)
        async function getCameraWithDeviceId() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                if (videoDevices.length === 0) {
                    throw new Error('No video devices found');
                }
                
                // Determine which camera to use based on facingMode preference
                // On many devices, back camera often has 'back' in label or is the second one
                let targetDevice = null;
                
                if (currentFacingMode === 'environment') {
                    // Prefer back camera - usually labeled "back" or "environment" or the one with larger resolution
                    targetDevice = videoDevices.find(device => 
                        device.label.toLowerCase().includes('back') || 
                        device.label.toLowerCase().includes('rear') ||
                        device.label.toLowerCase().includes('environment')
                    ) || videoDevices[0]; // fallback to first available
                } else {
                    // Prefer front camera
                    targetDevice = videoDevices.find(device => 
                        device.label.toLowerCase().includes('front') || 
                        device.label.toLowerCase().includes('user') ||
                        device.label.toLowerCase().includes('face')
                    ) || (videoDevices.length > 1 ? videoDevices[1] : videoDevices[0]);
                }
                
                if (targetDevice) {
                    return {
                        video: { deviceId: { exact: targetDevice.deviceId } },
                        audio: false
                    };
                }
                return getCameraConstraints(); // fallback to facingMode
            } catch (err) {
                console.warn('Device enumeration failed, using facingMode:', err);
                return getCameraConstraints();
            }
        }
        
        // Main function to start/switch camera
        async function startCamera(showLoading = true) {
            if (isSwitchingCamera) {
                console.log('Already switching camera, please wait...');
                return null;
            }
            
            isSwitchingCamera = true;
            if (showLoading) {
                setLoading(true);
            }
            updateStatus('Requesting access...');
            
            // Stop any existing stream tracks
            if (currentStream) {
                currentStream.getTracks().forEach(track => {
                    track.stop();
                    track.enabled = false;
                });
                currentStream = null;
            }
            
            // Clear video source to prevent hanging
            video.srcObject = null;
            
            // Small delay to ensure cleanup
            await new Promise(resolve => setTimeout(resolve, 100));
            
            let constraints;
            
            // Try using facingMode first (standard for mobile)
            try {
                constraints = getCameraConstraints();
                console.log('Attempting with constraints:', constraints);
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                currentStream = stream;
                
                // Wait for video to actually start playing
                await new Promise((resolve, reject) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve).catch(reject);
                    };
                    video.onerror = reject;
                    setTimeout(() => reject(new Error('Video load timeout')), 5000);
                });
                
                updateStatus('Active');
                errorDiv.style.display = 'none';
                
                // Determine which camera is actually active (for UI feedback)
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                const actualFacing = settings.facingMode;
                if (actualFacing) {
                    const cameraType = actualFacing === 'environment' ? 'Back Camera' : 'Front Camera';
                    statusTextSpan.textContent = `Active (${cameraType})`;
                } else {
                    statusTextSpan.textContent = 'Active';
                }
                
                setLoading(false);
                isSwitchingCamera = false;
                return stream;
                
            } catch (err) {
                console.error('Error with facingMode, trying device enumeration fallback:', err);
                
                // Fallback: try with device enumeration (works on more devices)
                try {
                    const fallbackConstraints = await getCameraWithDeviceId();
                    console.log('Fallback constraints:', fallbackConstraints);
                    
                    const stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    video.srcObject = stream;
                    currentStream = stream;
                    
                    await new Promise((resolve, reject) => {
                        video.onloadedmetadata = () => {
                            video.play().then(resolve).catch(reject);
                        };
                        video.onerror = reject;
                        setTimeout(() => reject(new Error('Video load timeout')), 5000);
                    });
                    
                    updateStatus('Active');
                    errorDiv.style.display = 'none';
                    statusTextSpan.textContent = 'Active';
                    setLoading(false);
                    isSwitchingCamera = false;
                    return stream;
                    
                } catch (fallbackErr) {
                    console.error('Fallback also failed:', fallbackErr);
                    updateStatus('Error', true);
                    errorDiv.style.display = 'block';
                    setLoading(false);
                    isSwitchingCamera = false;
                    return null;
                }
            }
        }
        
        // Switch between front and back camera
        async function switchCamera() {
            if (isSwitchingCamera) {
                console.log('Camera switch already in progress');
                return;
            }
            
            // Toggle facing mode
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            const newCameraName = currentFacingMode === 'environment' ? 'Back Camera' : 'Front Camera';
            
            // Visual feedback on button
            const originalBtnText = switchCameraBtn.textContent;
            switchCameraBtn.textContent = '🔄 Switching...';
            switchCameraBtn.disabled = true;
            
            updateStatus(`Switching to ${newCameraName}...`);
            
            try {
                await startCamera(true);
                // Reset mirror when switching camera? Keep user preference but might look odd
                // Keep mirror setting as is
                if (isMirrored) {
                    // Maintain mirror state, but note: front camera often looks more natural with mirror off
                    // We'll keep user's preference
                }
            } catch (err) {
                console.error('Switch failed:', err);
                // Revert facing mode if failed
                currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
                updateStatus('Switch failed', true);
                setTimeout(() => {
                    if (currentStream) {
                        updateStatus('Active');
                    }
                }, 2000);
            } finally {
                switchCameraBtn.textContent = originalBtnText;
                switchCameraBtn.disabled = false;
            }
        }
        
        // Toggle mirror flip (horizontal flip)
        function toggleMirrorFlip() {
            isMirrored = !isMirrored;
            if (isMirrored) {
                video.classList.add('mirrored');
                flipCameraBtn.textContent = '🪞 Normal';
                flipCameraBtn.style.backgroundColor = 'rgba(76, 175, 80, 0.8)';
            } else {
                video.classList.remove('mirrored');
                flipCameraBtn.textContent = '🪞 Mirror';
                flipCameraBtn.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
            }
            
            // Reset button color after short time
            setTimeout(() => {
                if (!isMirrored) {
                    flipCameraBtn.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
                } else {
                    flipCameraBtn.style.backgroundColor = 'rgba(76, 175, 80, 0.8)';
                }
            }, 150);
        }
        
        // Toggle full screen
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error('Error attempting to enable full screen:', err);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        // Toggle controls visibility in full screen
        function toggleControls() {
            document.body.classList.toggle('show-controls');
        }
        
        // Handle visibility change - restart camera if needed (when tab becomes active again)
        function handleVisibilityChange() {
            if (document.hidden) return;
            // If camera stream is not active or video paused, try to recover
            if (currentStream) {
                const videoTrack = currentStream.getVideoTracks()[0];
                if (videoTrack && videoTrack.readyState === 'ended') {
                    console.log('Video track ended, restarting camera...');
                    startCamera(false);
                } else if (video.paused) {
                    video.play().catch(e => console.warn('Auto-play failed:', e));
                }
            }
        }
        
        // Event listeners
        fullscreenBtn.addEventListener('click', toggleFullScreen);
        flipCameraBtn.addEventListener('click', toggleMirrorFlip);
        switchCameraBtn.addEventListener('click', switchCamera);
        retryBtn.addEventListener('click', () => {
            errorDiv.style.display = 'none';
            startCamera(true);
        });
        
        // Full screen change event
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('fullscreen');
                fullscreenBtn.textContent = '⛶ Exit';
            } else {
                document.body.classList.remove('fullscreen');
                document.body.classList.remove('show-controls');
                fullscreenBtn.textContent = '⛶ Full Screen';
            }
        });
        
        // ESC key to toggle controls in full screen
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.fullscreenElement) {
                e.preventDefault();
                toggleControls();
            }
        });
        
        // Handle touch events on mobile to prevent accidental zoom while keeping controls responsive
        let touchStartTime = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartTime = Date.now();
        }, { passive: true });
        
        // Handle device orientation change - reapply mirror if needed (no stream restart required)
        window.addEventListener('orientationchange', () => {
            // Small delay to let orientation settle
            setTimeout(() => {
                if (video.classList.contains('mirrored') !== isMirrored) {
                    // Sync class
                    if (isMirrored) {
                        video.classList.add('mirrored');
                    } else {
                        video.classList.remove('mirrored');
                    }
                }
            }, 100);
        });
        
        // Also handle when page visibility changes (important for mobile when switching apps)
        document.addEventListener('visibilitychange', handleVisibilityChange);
        
        // Initialize with back camera by default on page load
        window.addEventListener('load', async () => {
            // Set default to back camera (environment)
            currentFacingMode = 'environment';
            updateStatus('Starting back camera...');
            
            // Check if device is mobile by user agent (just for UI hint, not critical)
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                // Add small note for mobile users
                console.log('Mobile device detected - back camera will be used by default');
            }
            
            await startCamera(true);
            
            // Additional check: if on mobile and camera doesn't start, offer guidance
            setTimeout(() => {
                if (!currentStream || currentStream.getVideoTracks().length === 0) {
                    if (errorDiv.style.display !== 'block') {
                        // Show gentle reminder about permissions
                        console.log('Camera may need permissions');
                    }
                }
            }, 3000);
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
